<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philosophical CBT Journal</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 650px; margin: 40px auto; padding: 20px; background: #fafafa; color: #222; line-height: 1.5; }
        textarea { width: 100%; height: 140px; margin: 12px 0; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 20px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #111; color: #fff; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; }
        button:disabled { background: #888; cursor: not-allowed; }
        .section { background: #fff; padding: 20px; margin-top: 20px; border-radius: 8px; border: 1px solid #eee; }
        .title { font-weight: 700; margin-bottom: 6px; color: #000; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        #loading { display: none; margin-top: 20px; text-align: center; font-weight: bold; color: #666; }
    </style>
</head>
<body>
    <h2>Daily Constructive Journal</h2>
    
    <label class="title">Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="Paste your AI Studio Key here">

    <div class="section">
        <label class="title">What is on your mind? (Situation + Thoughts)</label>
        <textarea id="journalInput" placeholder="Write freely about your day or struggles"></textarea>
        <button id="analyzeBtn" onclick="processEntry()">Analyze Entry</button>
    </div>

    <div id="loading">Consulting frameworks...</div>

    <div id="results" style="display:none;">
        <div class="section"><div class="title">Cognitive Distortion</div><p id="distortionOut"></p></div>
        <div class="section"><div class="title">CBT Reframe</div><p id="cbtOut"></p></div>
        <div class="section"><div class="title">Stoicism (Dichotomy of Control)</div><p id="stoicOut"></p></div>
        <div class="section"><div class="title">Musashi's Way (Dokkōdō Resolve)</div><p id="musashiOut"></p></div>
        <div class="section"><div class="title">Buddhist Insight (Impermanence)</div><p id="buddhistOut"></p></div>
        <div class="section"><div class="title">Taoist Perspective (The Flow / Wu Wei)</div><p id="taoistOut"></p></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
